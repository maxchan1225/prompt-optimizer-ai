<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="輸入一句提示詞，立即生成三個不同風格、可直接複製使用的 AI 優化提示詞。">
  <title>AI 提示詞三版優化器</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #627084;
      --line: #dce3ec;
      --accent: #0f766e;
      --accent-dark: #0a4f49;
      --amber: #b45309;
      --blue: #2563eb;
      --soft: #e7f6f3;
      --shadow: 0 16px 42px rgba(23, 32, 42, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(15, 118, 110, .10), rgba(245, 247, 251, 0) 340px),
        var(--bg);
    }

    button,
    textarea,
    select,
    input {
      font: inherit;
    }

    .hero {
      min-height: 38vh;
      display: grid;
      align-items: end;
      padding: 48px 24px 30px;
      color: #fff;
      background:
        linear-gradient(90deg, rgba(7, 44, 41, .9), rgba(7, 44, 41, .42)),
        url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .hero-inner,
    .workspace,
    .footer {
      width: min(1160px, 100%);
      margin: 0 auto;
    }

    .hero h1 {
      margin: 0 0 12px;
      max-width: 860px;
      font-size: clamp(2.15rem, 5vw, 4.7rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 760px;
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.24rem);
      line-height: 1.7;
    }

    .workspace {
      display: grid;
      gap: 20px;
      padding: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    .panel-head h2 {
      font-size: 1.12rem;
    }

    .panel-head p,
    .hint,
    .version-meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.5;
    }

    .panel-body {
      padding: 20px;
    }

    .prompt-input {
      width: 100%;
      min-height: 148px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--ink);
      background: #fbfcfe;
      line-height: 1.65;
      outline: none;
    }

    .prompt-input:focus,
    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: .86rem;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
    }

    .btn.secondary {
      color: var(--ink);
      border-color: var(--line);
      background: #fff;
      font-weight: 650;
    }

    .btn.warn {
      background: var(--amber);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .version-card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 430px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .version-card.precise {
      border-top: 5px solid var(--accent);
    }

    .version-card.creative {
      border-top: 5px solid var(--amber);
    }

    .version-card.structured {
      border-top: 5px solid var(--blue);
    }

    .version-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .version-head h3 {
      font-size: 1rem;
    }

    .prompt-result {
      white-space: pre-wrap;
      padding: 16px;
      color: #eef6ff;
      background: #111827;
      line-height: 1.65;
      font-size: .94rem;
      overflow: auto;
    }

    .version-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfe;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      color: var(--accent-dark);
      background: var(--soft);
      font-size: .82rem;
      font-weight: 700;
    }

    .empty {
      grid-column: 1 / -1;
      display: grid;
      min-height: 220px;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fbfcfe;
      text-align: center;
      padding: 24px;
      line-height: 1.65;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: 8px;
      background: #17202a;
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      padding: 0 24px 36px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .controls,
      .results {
        grid-template-columns: 1fr;
      }

      .version-card {
        min-height: 0;
      }
    }

    @media (max-width: 620px) {
      .hero {
        min-height: 42vh;
        padding: 34px 18px 24px;
      }

      .workspace {
        padding: 18px 16px 24px;
      }

      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1>AI 提示詞三版優化器</h1>
      <p>輸入一句普通提示詞，立即改寫成三個不同風格的高品質版本。每一版都能直接複製到 ChatGPT、DeepSeek、Gemini 或其他 AI 模型使用。</p>
    </div>
  </header>

  <main class="workspace">
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>輸入一句提示詞</h2>
          <p>不用寫得完美，先把想法丟進來，我會幫你整理成三種可用版本。</p>
        </div>
        <button class="btn secondary" id="sampleBtn" type="button">載入範例</button>
      </div>
      <div class="panel-body">
        <textarea id="sourcePrompt" class="prompt-input" placeholder="例如：幫我寫一篇關於 AI 學習工具的文章，要吸引學生。"></textarea>
        <div class="controls">
          <label>
            目標模型
            <select id="model">
              <option value="通用 AI 模型">通用 AI 模型</option>
              <option value="ChatGPT">ChatGPT</option>
              <option value="DeepSeek">DeepSeek</option>
              <option value="Gemini">Gemini</option>
              <option value="Claude">Claude</option>
            </select>
          </label>
          <label>
            用途
            <select id="task">
              <option value="寫作與改寫">寫作與改寫</option>
              <option value="教學設計">教學設計</option>
              <option value="資料分析">資料分析</option>
              <option value="程式開發">程式開發</option>
              <option value="研究整理">研究整理</option>
              <option value="商業企劃">商業企劃</option>
            </select>
          </label>
          <label>
            輸出語言
            <select id="language">
              <option value="繁體中文">繁體中文</option>
              <option value="簡體中文">簡體中文</option>
              <option value="English">English</option>
              <option value="中英雙語">中英雙語</option>
            </select>
          </label>
          <label>
            必須包含
            <input id="mustHave" type="text" placeholder="例如：表格、步驟、例子">
          </label>
        </div>
        <div class="actions">
          <button class="btn" id="optimizeBtn" type="button">生成 3 個版本</button>
          <button class="btn warn" id="clearBtn" type="button">清空</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>三個可直接複製的版本</h2>
          <p>每個版本都針對不同使用情境：精準、創意、結構化。</p>
        </div>
      </div>
      <div class="panel-body">
        <div class="results" id="results" aria-live="polite">
          <div class="empty">生成後會在這裡出現三個版本。<br>你可以挑最合適的一版直接複製使用。</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    本工具在瀏覽器中即時改寫提示詞，不會上傳你的內容。
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const sourcePrompt = document.querySelector("#sourcePrompt");
    const model = document.querySelector("#model");
    const task = document.querySelector("#task");
    const language = document.querySelector("#language");
    const mustHave = document.querySelector("#mustHave");
    const results = document.querySelector("#results");
    const toast = document.querySelector("#toast");

    const variants = [
      {
        key: "precise",
        title: "版本一：專業精準版",
        badge: "清楚、穩定、少誤解",
        intro: "你是一位專業且細心的 AI 助手。請根據我的需求，產出清楚、準確、可直接使用的內容。",
        style: "語氣要專業清晰，避免空泛描述。若資訊不足，請先列出必要假設，再完成任務。"
      },
      {
        key: "creative",
        title: "版本二：創意發散版",
        badge: "有新意、有角度",
        intro: "你是一位有創意的內容策略顧問。請從多個角度理解我的需求，提出更吸引人、更有想像力的答案。",
        style: "請保留實用性，同時加入具體例子、亮點設計或更有感染力的表達。"
      },
      {
        key: "structured",
        title: "版本三：結構化執行版",
        badge: "步驟、格式、可落地",
        intro: "你是一位擅長拆解任務的執行型專家。請把我的需求整理成有步驟、有格式、容易檢查的輸出。",
        style: "請使用清楚標題、條列步驟、表格或檢查清單，讓結果能直接拿去執行。"
      }
    ];

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1700);
    }

    function buildPrompt(variant, raw) {
      const extra = mustHave.value.trim();
      const modelLine = model.value === "通用 AI 模型"
        ? "請使用適合大多數語言模型的穩定提示詞格式。"
        : `請優先適配 ${model.value} 的回答特性。`;

      return [
        variant.intro,
        "",
        "【我的原始需求】",
        raw,
        "",
        "【任務設定】",
        `- 用途：${task.value}`,
        `- 輸出語言：${language.value}`,
        `- 模型適配：${modelLine}`,
        extra ? `- 必須包含：${extra}` : "- 必須包含：明確結論、具體內容、可執行建議",
        "",
        "【回答要求】",
        `- ${variant.style}`,
        "- 不要只給籠統建議，要給可以直接使用或修改的完整內容。",
        "- 如果需要補充背景，請用最少的問題指出缺少哪些資訊。",
        "- 最後請附上簡短檢查，確認答案是否符合我的需求。"
      ].join("\n");
    }

    function renderResults() {
      const raw = sourcePrompt.value.trim();
      if (!raw) {
        showToast("請先輸入一句提示詞");
        sourcePrompt.focus();
        return;
      }

      results.innerHTML = "";
      variants.forEach((variant, index) => {
        const prompt = buildPrompt(variant, raw);
        const card = document.createElement("article");
        card.className = `version-card ${variant.key}`;
        card.innerHTML = `
          <div class="version-head">
            <h3>${variant.title}</h3>
            <p class="version-meta">${variant.badge}</p>
          </div>
          <div class="prompt-result" id="result-${index}"></div>
          <div class="version-actions">
            <span class="badge">${model.value}</span>
            <button class="btn secondary" type="button" data-copy="${index}">複製這版</button>
          </div>
        `;
        results.appendChild(card);
        card.querySelector(`#result-${index}`).textContent = prompt;
      });

      showToast("已生成 3 個版本");
    }

    async function copyVersion(index) {
      const target = document.querySelector(`#result-${index}`);
      if (!target) return;
      await navigator.clipboard.writeText(target.textContent);
      showToast(`已複製版本 ${Number(index) + 1}`);
    }

    document.querySelector("#optimizeBtn").addEventListener("click", renderResults);

    results.addEventListener("click", event => {
      const button = event.target.closest("[data-copy]");
      if (button) copyVersion(button.dataset.copy);
    });

    document.querySelector("#clearBtn").addEventListener("click", () => {
      sourcePrompt.value = "";
      mustHave.value = "";
      results.innerHTML = '<div class="empty">生成後會在這裡出現三個版本。<br>你可以挑最合適的一版直接複製使用。</div>';
      showToast("已清空");
    });

    document.querySelector("#sampleBtn").addEventListener("click", () => {
      sourcePrompt.value = "幫我設計一堂 45 分鐘的高中英文課，主題是 AI 對未來工作的影響，希望學生能討論並完成一份短講稿。";
      model.value = "ChatGPT";
      task.value = "教學設計";
      language.value = "繁體中文";
      mustHave.value = "教學流程、討論問題、評量方式";
      renderResults();
    });
  </script>
</body>
</html>
